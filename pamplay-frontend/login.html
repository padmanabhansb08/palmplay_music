<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <script>!function(){if(document.querySelector("base[data-pp-base]"))return;var p=location.pathname,b="/pamplay-frontend/";(p==="/app"||p.startsWith("/app/"))&&(b="/app/");var e=document.createElement("base");e.setAttribute("data-pp-base","1");e.href=b;document.head.insertBefore(e,document.head.firstChild)}();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PalmPlay - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #FF0000;
            --primary-glow: rgba(255, 0, 0, 0.4);
            --bg-base: #000000;
            --bg-elevated: #121212;
            --text-base: #FFFFFF;
            --text-subdued: #B3B3B3;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-base);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a0000 0%, #000000 100%);
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            background: rgba(18, 18, 18, 0.8);
            border-radius: 12px;
            padding: 60px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            animation: fadeIn 0.8s cubic-bezier(0.3, 0, 0.4, 1);
        }

        .logo {
            font-size: 40px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 40px;
            letter-spacing: -2px;
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .login-subtitle {
            color: var(--text-subdued);
            margin-bottom: 40px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-base);
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 4px;
            background: #2a2a2a;
            border: 1px solid transparent;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: #333;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            border-radius: 500px;
            background-color: var(--primary);
            color: white;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .login-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: var(--text-subdued);
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #333;
        }

        .divider:not(:empty)::before {
            margin-right: 12px;
        }

        .divider:not(:empty)::after {
            margin-left: 12px;
        }

        .social-login {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border-radius: 4px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 20px;
        }

        .social-btn:hover {
            background: #333;
            border-color: #666;
        }

        .footer-links {
            margin-top: 40px;
            font-size: 14px;
            color: var(--text-subdued);
        }

        .footer-links a {
            color: var(--text-base);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .back-link {
            position: absolute;
            top: 40px;
            left: 40px;
            color: var(--text-subdued);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-link:hover {
            color: white;
        }

        @keyframes modalIn {
            from {
                transform: scale(0.95) translateY(10px);
                opacity: 0;
            }

            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        /* Toast Styles */
        #toast-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: rgba(30, 30, 30, 0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 500px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            animation: toastIn 0.4s cubic-bezier(0.3, 0, 0.4, 1), toastOut 0.4s cubic-bezier(0.3, 0, 0.4, 1) 3s forwards;
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: auto;
        }

        @keyframes toastIn {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes toastOut {
            from {
                transform: translateY(0);
                opacity: 1;
            }

            to {
                transform: translateY(-30px);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <a href="../index.html" class="back-link"><i class="fas fa-chevron-left"></i> Home</a>

    <div class="login-container">
        <div class="logo">PalmPlay</div>
        <h2 class="login-title">Log in to PalmPlay</h2>
        <p class="login-subtitle">Your local music, evolved.</p>

        <form id="login-form">
            <div class="input-group">
                <label>Email address or username</label>
                <input type="text" id="login-email" placeholder="Email address or username" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-pass" placeholder="Password" required>
            </div>
            <div id="turnstile-widget" style="display:none;"></div>
            <button type="submit" class="login-btn">Log In</button>
        </form>

        <a href="#"
            style="color: var(--text-base); text-decoration: none; font-size: 14px; display: block; margin-bottom: 24px;">Forgot
            your password?</a>

        <script src="lib/routes.js"></script>
        <script src="supabase-config.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="lib/palmplay-auth.js"></script>
        <script src="lib/palmplay-captcha.js"></script>
        <script src="lib/palmplay-login-page.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                window.PalmPlayLoginPage.initAuthForms('login');
            });
        </script>

        <div class="footer-links">
            Don't have an account? <a href="signup.html" data-pp-route="signup">Sign up for PalmPlay</a>
            <div id="toast-container"></div>
        </div>
</body>

</html>
